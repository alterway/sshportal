version: 2

updates:

- package-ecosystem: docker
  cooldown:
    default-days: 3
  directory: "/"
  schedule:
    interval: "cron"
    cronjob: "0 1 1,16 * *"

- package-ecosystem: github-actions
  cooldown:
    default-days: 3
  directory: "/"
  schedule:
    interval: "cron"
    cronjob: "0 1 1,16 * *"
  commit-message:
    prefix: "chore(deps)"
  groups:
    gh-actions:
      patterns:
        - "*"

- package-ecosystem: gomod
  cooldown:
    default-days: 3
  directory: "/"
  schedule:
    interval: "cron"
    cronjob: "0 1 1,16 * *"
  commit-message:
    prefix: "chore(deps)"
  groups:
    go-deps:
      patterns:
        - "*"
